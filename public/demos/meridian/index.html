<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FORMA Admin · Meridian — portfolio demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: #fffcf7;
      --ink: #1a1f1c;
      --muted: #66706a;
      --line: rgba(26, 31, 28, 0.1);
      --accent: #0f6b4c;
      --accent-soft: #dff3ea;
      --warn: #9a5b16;
      --warn-soft: #fff1de;
      --danger: #a33b2a;
      --danger-soft: #fdecea;
      --select: #d9efe6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Plus Jakarta Sans", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, #ebe6db 0%, var(--bg) 40%),
        var(--bg);
      min-height: 100vh;
    }
    button { font: inherit; border: 0; background: none; cursor: pointer; color: inherit; }
    .shell { min-height: 100vh; display: flex; flex-direction: column; }
    .top {
      display: flex; align-items: center; gap: 14px;
      padding: 12px clamp(14px, 3vw, 28px);
      border-bottom: 1px solid var(--line);
      background: rgba(255,252,247,0.9);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 10;
    }
    .mark {
      width: 28px; height: 28px; border-radius: 8px;
      display: grid; place-items: center;
      background: var(--accent); color: #f4fff9;
      font-weight: 700; font-size: 12px; letter-spacing: -0.02em;
    }
    .brand { font-weight: 700; font-size: 15px; }
    .brand small { display: block; color: var(--muted); font-weight: 500; font-size: 11px; }
    .spacer { flex: 1; }
    .nav { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      padding: 7px 10px; border-radius: 999px;
      border: 1px solid var(--line); background: var(--panel);
      font-size: 12px; font-weight: 600; color: var(--muted);
    }
    .chip.on { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
    .note {
      padding: 8px clamp(14px, 3vw, 28px);
      font-size: 11px; color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: rgba(255,252,247,0.65);
    }
    main {
      flex: 1;
      display: grid;
      gap: 16px;
      padding: 18px clamp(14px, 3vw, 28px) 28px;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 920px) {
      main { grid-template-columns: 1.35fr 0.85fr; align-items: start; }
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      min-height: 480px;
    }
    .card h1 { font-size: 20px; margin-bottom: 4px; }
    .card .sub { color: var(--muted); font-size: 13px; margin-bottom: 14px; line-height: 1.45; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 14px; align-items: center;
    }
    .toolbar-divider {
      width: 1px; height: 24px; background: var(--line); margin: 0 2px;
    }
    .btn {
      padding: 9px 12px; border-radius: 12px;
      font-size: 12px; font-weight: 600;
      border: 1px solid var(--line);
      background: #fff;
    }
    .btn.primary { background: var(--accent); color: #f4fff9; border-color: transparent; }
    .btn.ghost { background: transparent; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .tree { display: flex; flex-direction: column; gap: 6px; }
    .node {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      user-select: none;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    .node[draggable="true"] { cursor: grab; }
    .node.dragging { opacity: 0.45; }
    .node.drag-over {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(1px);
    }
    .node.selected { background: var(--select); border-color: rgba(15,107,76,0.35); }
    .node.focused { box-shadow: inset 0 0 0 2px rgba(15,107,76,0.25); }
    .node.low-stock { border-color: rgba(154,91,22,0.35); }
    .handle {
      font-family: "IBM Plex Mono", monospace;
      color: #9aa39c;
      font-size: 12px;
      letter-spacing: -1px;
    }
    .check {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid #9aa39c; display: grid; place-items: center;
      flex-shrink: 0;
    }
    .node.selected .check {
      background: var(--accent); border-color: var(--accent); color: #fff;
      font-size: 10px;
    }
    .label { flex: 1; font-size: 14px; font-weight: 600; cursor: pointer; }
    .meta {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
    }
    .badge {
      font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 999px;
      font-family: "Plus Jakarta Sans", sans-serif;
    }
    .badge.low { background: var(--warn-soft); color: var(--warn); }
    .depth-0 { margin-left: 0; }
    .depth-1 { margin-left: 22px; }
    .depth-2 { margin-left: 44px; }
    .side h2 {
      font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }
    .panel-block {
      padding: 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--line);
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.4;
    }
    .panel-block b { display: block; margin-bottom: 4px; font-size: 13px; }
    .panel-block.muted { color: var(--muted); font-size: 12px; }
    .batch {
      padding: 12px;
      border-radius: 12px;
      background: var(--accent-soft);
      border: 1px solid rgba(15,107,76,0.15);
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.4;
    }
    .batch b { display: block; margin-bottom: 4px; }
    .colorways { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .cw {
      padding: 6px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
      border: 1px solid var(--line); background: #fff; color: var(--muted);
    }
    .cw.on { border-color: transparent; color: var(--accent); background: var(--accent-soft); }
    .cw[data-cw="sand"].on { background: #f5efe4; color: #7a6348; }
    .cw[data-cw="moss"].on { background: #e4efe6; color: #3d6b4f; }
    .cw[data-cw="clay"].on { background: #f0e4dc; color: #8b5a42; }
    .stock-row {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line);
    }
    .stock-val {
      font-family: "IBM Plex Mono", monospace;
      font-size: 18px; font-weight: 500; min-width: 48px; text-align: center;
    }
    .stock-val.low { color: var(--warn); }
    .stock-btns { display: flex; gap: 6px; }
    .stock-btns .btn { width: 32px; height: 32px; padding: 0; border-radius: 10px; font-size: 16px; }
    .stock-list { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow: auto; }
    .stock-item {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 8px 10px; border-radius: 10px; background: #fff; border: 1px solid var(--line);
      font-size: 12px; cursor: pointer;
    }
    .stock-item.on { background: var(--select); border-color: rgba(15,107,76,0.25); }
    .stock-item .qty {
      font-family: "IBM Plex Mono", monospace; font-size: 11px;
    }
    .stock-item .qty.low { color: var(--warn); font-weight: 600; }
    .log {
      margin-top: 12px;
      display: flex; flex-direction: column; gap: 8px;
      max-height: 240px; overflow: auto;
    }
    .log div {
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
      display: flex; gap: 8px; align-items: flex-start;
    }
    .log .ico { flex-shrink: 0; font-size: 13px; line-height: 1.3; }
    .log .body { flex: 1; }
    .log .body b { color: var(--ink); font-weight: 600; }
    .log-empty {
      padding: 16px 14px; border-radius: 12px; border: 1px dashed var(--line);
      color: var(--muted); font-size: 12px; line-height: 1.55; text-align: center;
    }
    .scene-stock .card:first-child { border-color: rgba(15,107,76,0.2); }
    .toast {
      position: fixed; right: 16px; bottom: 16px;
      padding: 12px 14px; border-radius: 12px;
      background: var(--ink); color: #f7faf8; font-size: 13px;
      transform: translateY(110%); opacity: 0; transition: 0.22s ease;
      z-index: 40; max-width: min(320px, calc(100vw - 32px));
    }
    .toast.show { transform: none; opacity: 1; }
    .toast.warn { background: var(--warn); }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="mark">F</div>
      <div class="brand">FORMA Admin<small>Meridian · merchandising</small></div>
      <div class="spacer"></div>
      <nav class="nav" aria-label="Сцены">
        <button class="chip on" data-scene="tree">Дерево</button>
        <button class="chip" data-scene="batch">Пакет</button>
        <button class="chip" data-scene="stock">Склад</button>
      </nav>
    </header>
    <div class="note">Показательное демо портфолио · синтетический мебельный каталог FORMA · не продакшен SaaS</div>
    <main id="main">
      <section class="card">
        <h1 id="mainTitle">Дерево категорий</h1>
        <p class="sub" id="mainSub">Перетаскивайте узлы для порядка и вложенности. Shift+drop — sibling. Клик по названию — детали справа.</p>
        <div class="toolbar">
          <button class="btn ghost" id="expandAll">Развернуть</button>
          <button class="btn ghost" id="collapseAll">Свернуть</button>
          <span class="toolbar-divider"></span>
          <button class="btn" id="resetDemo">Сброс демо</button>
          <button class="btn primary" id="publish" disabled>Опубликовать</button>
        </div>
        <div class="tree" id="tree"></div>
      </section>
      <aside class="card side">
        <h2 id="sideTitle">Пакет и журнал</h2>
        <div id="detailPanel"></div>
        <div id="batchPanel"></div>
        <div class="log" id="log"></div>
      </aside>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const STORAGE_KEY = "forma_admin_v1";
    const LOW_STOCK = 12;
    const COLORWAY_OPTS = [
      { id: "sand", label: "Sand" },
      { id: "moss", label: "Moss" },
      { id: "clay", label: "Clay" },
    ];

    const DEFAULT_NODES = [
      { id: "living", name: "Living", parentId: null, sku: 186, stock: 94, open: true, colorways: ["sand", "moss"] },
      { id: "sofas", name: "Sofas", parentId: "living", sku: 52, stock: 18, open: true, colorways: ["sand", "clay"] },
      { id: "armchairs", name: "Armchairs", parentId: "living", sku: 38, stock: 11, open: true, colorways: ["moss"] },
      { id: "coffee", name: "Coffee tables", parentId: "living", sku: 44, stock: 22, open: true, colorways: ["sand", "moss", "clay"] },
      { id: "media", name: "Media units", parentId: "living", sku: 52, stock: 43, open: false, colorways: ["sand"] },
      { id: "dining", name: "Dining", parentId: null, sku: 142, stock: 67, open: true, colorways: ["clay", "moss"] },
      { id: "tables", name: "Tables", parentId: "dining", sku: 41, stock: 14, open: true, colorways: ["sand", "clay"] },
      { id: "chairs", name: "Chairs", parentId: "dining", sku: 68, stock: 9, open: true, colorways: ["moss", "clay"] },
      { id: "barstools", name: "Bar stools", parentId: "dining", sku: 33, stock: 44, open: false, colorways: ["sand"] },
      { id: "bedroom", name: "Bedroom", parentId: null, sku: 118, stock: 55, open: true, colorways: ["sand", "moss"] },
      { id: "beds", name: "Beds", parentId: "bedroom", sku: 28, stock: 7, open: true, colorways: ["sand", "clay"] },
      { id: "nightstands", name: "Nightstands", parentId: "bedroom", sku: 34, stock: 16, open: true, colorways: ["moss"] },
      { id: "wardrobes", name: "Wardrobes", parentId: "bedroom", sku: 31, stock: 19, open: false, colorways: ["sand"] },
      { id: "dressers", name: "Dressers", parentId: "bedroom", sku: 25, stock: 13, open: false, colorways: ["clay"] },
      { id: "outdoor", name: "Outdoor", parentId: null, sku: 67, stock: 28, open: true, colorways: ["moss", "clay"] },
      { id: "lounge", name: "Lounge sets", parentId: "outdoor", sku: 18, stock: 5, open: true, colorways: ["sand", "moss"] },
      { id: "outdoor-dining", name: "Dining sets", parentId: "outdoor", sku: 22, stock: 11, open: false, colorways: ["clay"] },
      { id: "planters", name: "Planters", parentId: "outdoor", sku: 27, stock: 12, open: false, colorways: ["clay"] },
      { id: "storage", name: "Storage", parentId: null, sku: 96, stock: 41, open: true, colorways: ["sand"] },
      { id: "shelves", name: "Shelves", parentId: "storage", sku: 34, stock: 20, open: true, colorways: ["sand", "moss"] },
      { id: "sideboards", name: "Sideboards", parentId: "storage", sku: 29, stock: 8, open: true, colorways: ["clay"] },
      { id: "cabinets", name: "Cabinets", parentId: "storage", sku: 21, stock: 10, open: false, colorways: ["moss"] },
      { id: "modular", name: "Modular systems", parentId: "storage", sku: 12, stock: 3, open: false, colorways: ["sand", "clay"] },
    ];

    let nodes = structuredClone(DEFAULT_NODES);
    const selected = new Set();
    let focusedId = "sofas";
    const logs = [];
    let dirty = false;
    let dragId = null;
    let currentScene = "tree";

    const treeEl = document.getElementById("tree");
    const batchPanel = document.getElementById("batchPanel");
    const detailPanel = document.getElementById("detailPanel");
    const logEl = document.getElementById("log");
    const publishBtn = document.getElementById("publish");
    const toastEl = document.getElementById("toast");
    const mainEl = document.getElementById("main");

    function toast(msg, warn) {
      toastEl.textContent = msg;
      toastEl.classList.toggle("warn", !!warn);
      toastEl.classList.add("show");
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => toastEl.classList.remove("show"), 1700);
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          nodes, logs: logs.slice(0, 12), dirty, focusedId,
        }));
      } catch (_) { /* quota */ }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (Array.isArray(data.nodes) && data.nodes.length) {
          nodes = data.nodes.map((n) => ({
            colorways: [],
            open: true,
            stock: 20,
            ...n,
            colorways: Array.isArray(n.colorways) ? n.colorways : [],
          }));
        }
        if (Array.isArray(data.logs)) logs.push(...data.logs);
        if (typeof data.dirty === "boolean") dirty = data.dirty;
        if (data.focusedId && nodes.some((n) => n.id === data.focusedId)) focusedId = data.focusedId;
        publishBtn.disabled = !dirty;
      } catch (_) { /* corrupt */ }
    }

    function resetDemo() {
      nodes = structuredClone(DEFAULT_NODES);
      selected.clear();
      focusedId = "sofas";
      logs.length = 0;
      dirty = false;
      publishBtn.disabled = true;
      localStorage.removeItem(STORAGE_KEY);
      pushLog("Демо сброшено к начальному дереву", "reset");
      toast("Демо восстановлено");
      render();
    }

    function depthOf(id) {
      let d = 0;
      let cur = nodes.find((n) => n.id === id);
      while (cur && cur.parentId) {
        d += 1;
        cur = nodes.find((n) => n.id === cur.parentId);
        if (d > 8) break;
      }
      return d;
    }

    function visibleNodes() {
      const byParent = new Map();
      nodes.forEach((n) => {
        const key = n.parentId || "__root";
        if (!byParent.has(key)) byParent.set(key, []);
        byParent.get(key).push(n);
      });
      const out = [];
      function walk(parentId) {
        (byParent.get(parentId || "__root") || []).forEach((n) => {
          out.push(n);
          if (n.open) walk(n.id);
        });
      }
      walk(null);
      return out;
    }

    function childrenOf(id) { return nodes.filter((n) => n.parentId === id); }

    function isDescendant(maybeChild, ancestorId) {
      let cur = nodes.find((n) => n.id === maybeChild);
      while (cur) {
        if (cur.parentId === ancestorId) return true;
        cur = nodes.find((n) => n.id === cur.parentId);
      }
      return false;
    }

    function pushLog(text, type) {
      const icons = { move: "↔", batch: "▣", stock: "±", color: "◐", publish: "↑", reset: "↺", warn: "!" };
      logs.unshift({ text, at: new Date().toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit", second: "2-digit" }), type: type || "move" });
      if (logs.length > 12) logs.pop();
      dirty = true;
      publishBtn.disabled = false;
      saveState();
      renderSide();
    }

    function adjustStock(id, delta) {
      const n = nodes.find((x) => x.id === id);
      if (!n) return;
      const prev = n.stock;
      n.stock = Math.max(0, (n.stock || 0) + delta);
      pushLog(`Склад «${n.name}»: ${prev} → ${n.stock}`, "stock");
      toast(delta > 0 ? `+${delta} · ${n.name}` : `${delta} · ${n.name}`, n.stock < LOW_STOCK && delta < 0);
      saveState();
      render();
    }

    function toggleColorway(id, cw) {
      const n = nodes.find((x) => x.id === id);
      if (!n) return;
      if (!Array.isArray(n.colorways)) n.colorways = [];
      const i = n.colorways.indexOf(cw);
      if (i >= 0) n.colorways.splice(i, 1);
      else n.colorways.push(cw);
      pushLog(`Colorways «${n.name}»: ${n.colorways.join(", ") || "—"}`, "color");
      toast(`Colorway · ${cw}`);
      saveState();
      renderSide();
    }

    function lowStockNodes() {
      return nodes.filter((n) => (n.stock ?? 0) < LOW_STOCK).sort((a, b) => a.stock - b.stock);
    }

    function renderTree() {
      const list = visibleNodes();
      treeEl.innerHTML = list.map((n) => {
        const depth = depthOf(n.id);
        const kids = childrenOf(n.id).length;
        const sel = selected.has(n.id);
        const foc = focusedId === n.id;
        const low = (n.stock ?? 0) < LOW_STOCK;
        return `
          <div class="node depth-${Math.min(depth, 2)} ${sel ? "selected" : ""} ${foc ? "focused" : ""} ${low ? "low-stock" : ""}"
               draggable="true" data-id="${n.id}">
            <span class="handle">⋮⋮</span>
            <button class="check" data-select="${n.id}" aria-label="выбрать">${sel ? "✓" : ""}</button>
            ${kids ? `<button data-toggle="${n.id}" style="width:18px;font-size:12px;color:var(--muted)">${n.open ? "▾" : "▸"}</button>` : `<span style="width:18px"></span>`}
            <span class="label" data-focus="${n.id}">${n.name}</span>
            <span class="meta">
              ${low ? `<span class="badge low">${n.stock} шт</span>` : `<span>${n.stock ?? 0} шт</span>`}
              <span>${n.sku} SKU</span>
            </span>
          </div>`;
      }).join("");

      treeEl.querySelectorAll(".node").forEach((el) => {
        el.addEventListener("dragstart", (e) => {
          dragId = el.dataset.id;
          el.classList.add("dragging");
          e.dataTransfer.effectAllowed = "move";
        });
        el.addEventListener("dragend", () => {
          dragId = null;
          el.classList.remove("dragging");
          treeEl.querySelectorAll(".drag-over").forEach((n) => n.classList.remove("drag-over"));
        });
        el.addEventListener("dragover", (e) => {
          e.preventDefault();
          el.classList.add("drag-over");
        });
        el.addEventListener("dragleave", () => el.classList.remove("drag-over"));
        el.addEventListener("drop", (e) => {
          e.preventDefault();
          el.classList.remove("drag-over");
          const targetId = el.dataset.id;
          if (!dragId || dragId === targetId) return;
          if (isDescendant(targetId, dragId)) {
            toast("Нельзя вложить родителя в потомка", true);
            return;
          }
          const moving = nodes.find((n) => n.id === dragId);
          const target = nodes.find((n) => n.id === targetId);
          const nest = !e.shiftKey;
          if (nest) {
            moving.parentId = target.id;
            target.open = true;
            pushLog(`«${moving.name}» → под «${target.name}»`, "move");
          } else {
            moving.parentId = target.parentId;
            const others = nodes.filter((n) => n.id !== moving.id);
            const idx = others.findIndex((n) => n.id === target.id);
            others.splice(idx + 1, 0, moving);
            nodes = others;
            pushLog(`«${moving.name}» после «${target.name}»`, "move");
          }
          if (nest) {
            nodes = nodes.filter((n) => n.id !== moving.id);
            const tIdx = nodes.findIndex((n) => n.id === target.id);
            nodes.splice(tIdx + 1, 0, moving);
          }
          toast("Иерархия обновлена");
          saveState();
          render();
        });
      });
    }

    function renderDetail() {
      const n = nodes.find((x) => x.id === focusedId);
      if (!n) {
        detailPanel.innerHTML = `<div class="panel-block muted">Выберите категорию в дереве для colorways и склада.</div>`;
        return;
      }
      const cws = n.colorways || [];
      const low = (n.stock ?? 0) < LOW_STOCK;
      detailPanel.innerHTML = `
        <div class="panel-block">
          <b>${n.name}</b>
          ${n.sku} SKU · конфигurator storefront
          <div class="colorways" role="group" aria-label="Colorways">
            ${COLORWAY_OPTS.map((cw) => `
              <button class="cw ${cws.includes(cw.id) ? "on" : ""}" data-cw="${cw.id}" data-node="${n.id}">${cw.label}</button>
            `).join("")}
          </div>
          <div class="stock-row">
            <span style="font-size:12px;color:var(--muted)">Остаток</span>
            <div class="stock-btns">
              <button class="btn" data-stock-delta="-1" data-node="${n.id}" aria-label="минус">−</button>
              <span class="stock-val ${low ? "low" : ""}">${n.stock ?? 0}</span>
              <button class="btn" data-stock-delta="1" data-node="${n.id}" aria-label="плюс">+</button>
            </div>
          </div>
        </div>`;

      detailPanel.querySelectorAll("[data-cw]").forEach((btn) => {
        btn.onclick = () => toggleColorway(btn.dataset.node, btn.dataset.cw);
      });
      detailPanel.querySelectorAll("[data-stock-delta]").forEach((btn) => {
        btn.onclick = () => adjustStock(btn.dataset.node, Number(btn.dataset.stockDelta));
      });
    }

    function renderBatch() {
      const count = selected.size;
      const skus = nodes.filter((n) => selected.has(n.id)).reduce((a, n) => a + n.sku, 0);
      const lowCount = lowStockNodes().length;
      batchPanel.innerHTML = `
        <div class="batch"><b>${count || 0} категорий выбрано</b>${skus} SKU в выделении · ${nodes.length} узлов · ${lowCount} с низким остатком</div>
        <div class="toolbar" style="margin-bottom:12px">
          <button class="btn" id="moveDining" ${count ? "" : "disabled"}>→ Dining</button>
          <button class="btn" id="moveBedroom" ${count ? "" : "disabled"}>→ Bedroom</button>
          <button class="btn" id="moveStorage" ${count ? "" : "disabled"}>→ Storage</button>
          <button class="btn" id="seasonal" ${count ? "" : "disabled"}>Сезонный порядок</button>
        </div>
        ${currentScene === "stock" ? `
          <div class="panel-block">
            <b>Низкий остаток (&lt; ${LOW_STOCK})</b>
            <div class="stock-list" style="margin-top:8px">
              ${lowStockNodes().map((item) => `
                <div class="stock-item ${focusedId === item.id ? "on" : ""}" data-focus-stock="${item.id}">
                  <span>${item.name}</span>
                  <span class="qty low">${item.stock} шт</span>
                </div>
              `).join("") || `<span style="color:var(--muted);font-size:12px">Все позиции в норме</span>`}
            </div>
          </div>
        ` : `
          <div class="batch" style="background:var(--warn-soft);border-color:rgba(154,91,22,0.2)">
            <b>Optimistic UI</b>
            Publish пишет draft; конфликт (~25%) откатывается в демо-тосте.
          </div>
        `}`;

      document.getElementById("moveDining")?.addEventListener("click", () => batchMove("dining", "Dining"));
      document.getElementById("moveBedroom")?.addEventListener("click", () => batchMove("bedroom", "Bedroom"));
      document.getElementById("moveStorage")?.addEventListener("click", () => batchMove("storage", "Storage"));
      document.getElementById("seasonal")?.addEventListener("click", () => {
        pushLog(`Сезонный reorder для ${count} узлов`, "batch");
        toast("Сезонный порядок помечен");
      });
      batchPanel.querySelectorAll("[data-focus-stock]").forEach((el) => {
        el.onclick = () => {
          focusedId = el.dataset.focusStock;
          saveState();
          render();
        };
      });
    }

    function batchMove(targetId, label) {
      const count = selected.size;
      const target = nodes.find((n) => n.id === targetId);
      [...selected].forEach((id) => {
        if (id === targetId) return;
        if (isDescendant(targetId, id)) return;
        const n = nodes.find((x) => x.id === id);
        if (n) n.parentId = targetId;
      });
      if (target) target.open = true;
      pushLog(`Batch → ${label} (${count})`, "batch");
      toast(`Batch move → ${label}`);
      selected.clear();
      saveState();
      render();
    }

    function renderLog() {
      if (!logs.length) {
        logEl.innerHTML = `
          <div class="log-empty">
            <div style="font-size:18px;margin-bottom:6px">◎</div>
            Журнал пуст · перетащите категорию, измените склад или включите colorway.<br />
            <span style="font-size:11px;margin-top:6px;display:block">Living · Dining · Bedroom · Outdoor · Storage</span>
          </div>`;
        return;
      }
      const icons = { move: "↔", batch: "▣", stock: "±", color: "◐", publish: "↑", reset: "↺", warn: "!" };
      logEl.innerHTML = logs.map((l) => `
        <div>
          <span class="ico">${icons[l.type] || "·"}</span>
          <span class="body"><b>${l.at}</b> · ${l.text}</span>
        </div>
      `).join("");
    }

    function renderSide() {
      renderDetail();
      renderBatch();
      renderLog();
    }

    function render() {
      renderTree();
      renderSide();
    }

    treeEl.addEventListener("click", (e) => {
      const sel = e.target.closest("[data-select]");
      if (sel) {
        const id = sel.dataset.select;
        if (selected.has(id)) selected.delete(id);
        else selected.add(id);
        render();
        return;
      }
      const foc = e.target.closest("[data-focus]");
      if (foc) {
        focusedId = foc.dataset.focus;
        saveState();
        render();
        return;
      }
      const tog = e.target.closest("[data-toggle]");
      if (tog) {
        const n = nodes.find((x) => x.id === tog.dataset.toggle);
        if (n) { n.open = !n.open; saveState(); render(); }
      }
    });

    document.getElementById("expandAll").onclick = () => {
      nodes.forEach((n) => (n.open = true));
      saveState();
      render();
    };
    document.getElementById("collapseAll").onclick = () => {
      nodes.forEach((n) => { if (n.parentId === null) n.open = false; });
      saveState();
      render();
    };
    document.getElementById("resetDemo").onclick = resetDemo;
    publishBtn.onclick = () => {
      if (publishBtn.disabled) return;
      if (Math.random() < 0.25) {
        toast("Conflict · draft rolled back (demo)", true);
        pushLog("Publish conflict — optimistic rollback", "warn");
      } else {
        dirty = false;
        publishBtn.disabled = true;
        toast("Иерархия опубликована");
        pushLog("Draft hierarchy published", "publish");
      }
      saveState();
      renderSide();
    };

    function applyScene() {
      const hash = (location.hash || "#/tree").replace("#", "").replace(/^\//, "") || "tree";
      currentScene = hash;
      mainEl.classList.toggle("scene-stock", hash === "stock");

      document.querySelectorAll(".chip").forEach((c) => {
        c.classList.toggle("on", c.dataset.scene === hash);
      });

      const titles = {
        tree: ["Дерево категорий", "Перетаскивайте узлы для порядка и вложенности. Shift+drop — sibling. Клик по названию — детали справа."],
        batch: ["Пакетные операции", "Выделите чекбоксами несколько категорий и переместите их одним действием."],
        stock: ["Склад по категориям", "Низкий остаток подсвечен. ± справа или список ниже — выбор позиции."],
      };
      const [t, s] = titles[hash] || titles.tree;
      document.getElementById("mainTitle").textContent = t;
      document.getElementById("mainSub").textContent = s;
      document.getElementById("sideTitle").textContent =
        hash === "stock" ? "Склад и журнал" : hash === "batch" ? "Пакет и журнал" : "Детали и журнал";

      if (hash === "batch") {
        selected.clear();
        nodes.filter((n) => n.parentId === "living").forEach((n) => selected.add(n.id));
        focusedId = "sofas";
        render();
      } else if (hash === "stock") {
        const low = lowStockNodes()[0];
        if (low) focusedId = low.id;
        render();
      } else {
        renderSide();
      }
    }

    document.querySelectorAll(".chip").forEach((c) => {
      c.onclick = () => { location.hash = `#/${c.dataset.scene}`; };
    });
    window.addEventListener("hashchange", applyScene);

    loadState();
    render();
    applyScene();
  </script>
</body>
</html>
