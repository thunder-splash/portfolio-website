<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meridian Merch — portfolio demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: #fffcf7;
      --ink: #1a1f1c;
      --muted: #66706a;
      --line: rgba(26, 31, 28, 0.1);
      --accent: #0f6b4c;
      --accent-soft: #dff3ea;
      --warn: #9a5b16;
      --warn-soft: #fff1de;
      --select: #d9efe6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Plus Jakarta Sans", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, #ebe6db 0%, var(--bg) 40%),
        var(--bg);
      min-height: 100vh;
    }
    button { font: inherit; border: 0; background: none; cursor: pointer; color: inherit; }
    .shell { min-height: 100vh; display: flex; flex-direction: column; }
    .top {
      display: flex; align-items: center; gap: 14px;
      padding: 12px clamp(14px, 3vw, 28px);
      border-bottom: 1px solid var(--line);
      background: rgba(255,252,247,0.9);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 10;
    }
    .mark {
      width: 28px; height: 28px; border-radius: 8px;
      display: grid; place-items: center;
      background: var(--accent); color: #f4fff9;
      font-weight: 700; font-size: 13px;
    }
    .brand { font-weight: 700; font-size: 15px; }
    .brand small { display: block; color: var(--muted); font-weight: 500; font-size: 11px; }
    .spacer { flex: 1; }
    .chip {
      padding: 7px 10px; border-radius: 999px;
      border: 1px solid var(--line); background: var(--panel);
      font-size: 12px; font-weight: 600; color: var(--muted);
    }
    .chip.on { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
    .note {
      padding: 8px clamp(14px, 3vw, 28px);
      font-size: 11px; color: var(--muted);
      border-bottom: 1px solid var(--line);
      background: rgba(255,252,247,0.65);
    }
    main {
      flex: 1;
      display: grid;
      gap: 16px;
      padding: 18px clamp(14px, 3vw, 28px) 28px;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 920px) {
      main { grid-template-columns: 1.35fr 0.85fr; align-items: start; }
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      min-height: 480px;
    }
    .card h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }
    .card .sub { color: var(--muted); font-size: 13px; margin-bottom: 14px; line-height: 1.45; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 14px;
    }
    .btn {
      padding: 9px 12px; border-radius: 12px;
      font-size: 12px; font-weight: 600;
      border: 1px solid var(--line);
      background: #fff;
    }
    .btn.primary { background: var(--accent); color: #f4fff9; border-color: transparent; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .tree { display: flex; flex-direction: column; gap: 6px; }
    .node {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      user-select: none;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    .node[draggable="true"] { cursor: grab; }
    .node.dragging { opacity: 0.45; }
    .node.drag-over {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(1px);
    }
    .node.selected { background: var(--select); border-color: rgba(15,107,76,0.35); }
    .handle {
      font-family: "IBM Plex Mono", monospace;
      color: #9aa39c;
      font-size: 12px;
      letter-spacing: -1px;
    }
    .check {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid #9aa39c; display: grid; place-items: center;
      flex-shrink: 0;
    }
    .node.selected .check {
      background: var(--accent); border-color: var(--accent); color: #fff;
      font-size: 10px;
    }
    .label { flex: 1; font-size: 14px; font-weight: 600; }
    .meta {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px; color: var(--muted);
    }
    .depth-0 { margin-left: 0; }
    .depth-1 { margin-left: 22px; }
    .depth-2 { margin-left: 44px; }
    .side h2 {
      font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }
    .batch {
      padding: 12px;
      border-radius: 12px;
      background: var(--accent-soft);
      border: 1px solid rgba(15,107,76,0.15);
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.4;
    }
    .batch b { display: block; margin-bottom: 4px; }
    .log {
      margin-top: 16px;
      display: flex; flex-direction: column; gap: 8px;
      max-height: 220px; overflow: auto;
    }
    .log div {
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }
    .toast {
      position: fixed; right: 16px; bottom: 16px;
      padding: 12px 14px; border-radius: 12px;
      background: var(--ink); color: #f7faf8; font-size: 13px;
      transform: translateY(110%); opacity: 0; transition: 0.22s ease;
      z-index: 40;
    }
    .toast.show { transform: none; opacity: 1; }
    .toast.warn { background: var(--warn); }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top">
      <div class="mark">M</div>
      <div class="brand">Meridian Merch<small>Hierarchy · DnD admin</small></div>
      <div class="spacer"></div>
      <button class="chip on" data-scene="tree">Tree</button>
      <button class="chip" data-scene="batch">Batch</button>
    </header>
    <div class="note">Показательное демо портфолио · синтетическое дерево категорий · не продакшен SaaS</div>
    <main>
      <section class="card">
        <h1>Category tree</h1>
        <p class="sub">Перетаскивайте узлы, чтобы менять порядок и вложенность. Выделяйте чекбоксами для batch-операций.</p>
        <div class="toolbar">
          <button class="btn" id="expandAll">Expand all</button>
          <button class="btn" id="collapseAll">Collapse</button>
          <button class="btn primary" id="publish" disabled>Publish draft</button>
        </div>
        <div class="tree" id="tree"></div>
      </section>
      <aside class="card side">
        <h2>Batch & activity</h2>
        <div id="batchPanel"></div>
        <div class="log" id="log"></div>
      </aside>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    /** Nested merchandising tree — synthetic catalog */
    let nodes = [
      { id: "living", name: "Living room", parentId: null, sku: 128, open: true },
      { id: "sofas", name: "Sofas", parentId: "living", sku: 42, open: true },
      { id: "armchairs", name: "Armchairs", parentId: "living", sku: 31, open: true },
      { id: "dining", name: "Dining", parentId: null, sku: 96, open: true },
      { id: "tables", name: "Tables", parentId: "dining", sku: 27, open: true },
      { id: "chairs", name: "Chairs", parentId: "dining", sku: 54, open: true },
      { id: "storage", name: "Storage", parentId: null, sku: 64, open: true },
      { id: "shelves", name: "Shelves", parentId: "storage", sku: 22, open: true },
      { id: "sideboards", name: "Sideboards", parentId: "storage", sku: 18, open: true },
    ];

    const selected = new Set();
    const logs = [];
    let dirty = false;
    let dragId = null;

    const treeEl = document.getElementById("tree");
    const batchPanel = document.getElementById("batchPanel");
    const logEl = document.getElementById("log");
    const publishBtn = document.getElementById("publish");
    const toastEl = document.getElementById("toast");

    function toast(msg, warn) {
      toastEl.textContent = msg;
      toastEl.classList.toggle("warn", !!warn);
      toastEl.classList.add("show");
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => toastEl.classList.remove("show"), 1700);
    }

    function depthOf(id) {
      let d = 0; let cur = nodes.find((n) => n.id === id);
      while (cur && cur.parentId) {
        d += 1;
        cur = nodes.find((n) => n.id === cur.parentId);
        if (d > 8) break;
      }
      return d;
    }

    function visibleNodes() {
      const byParent = new Map();
      nodes.forEach((n) => {
        const key = n.parentId || "__root";
        if (!byParent.has(key)) byParent.set(key, []);
        byParent.get(key).push(n);
      });
      const out = [];
      function walk(parentId) {
        const kids = byParent.get(parentId || "__root") || [];
        kids.forEach((n) => {
          out.push(n);
          if (n.open) walk(n.id);
        });
      }
      walk(null);
      return out;
    }

    function childrenOf(id) {
      return nodes.filter((n) => n.parentId === id);
    }

    function isDescendant(maybeChild, ancestorId) {
      let cur = nodes.find((n) => n.id === maybeChild);
      while (cur) {
        if (cur.parentId === ancestorId) return true;
        cur = nodes.find((n) => n.id === cur.parentId);
      }
      return false;
    }

    function pushLog(text) {
      logs.unshift({ text, at: new Date().toLocaleTimeString() });
      if (logs.length > 8) logs.pop();
      dirty = true;
      publishBtn.disabled = false;
      renderSide();
    }

    function renderTree() {
      const list = visibleNodes();
      treeEl.innerHTML = list.map((n) => {
        const depth = depthOf(n.id);
        const kids = childrenOf(n.id).length;
        const sel = selected.has(n.id);
        return `
          <div class="node depth-${Math.min(depth, 2)} ${sel ? "selected" : ""}"
               draggable="true" data-id="${n.id}">
            <span class="handle">⋮⋮</span>
            <button class="check" data-select="${n.id}" aria-label="select">${sel ? "✓" : ""}</button>
            ${kids ? `<button data-toggle="${n.id}" style="width:18px;font-size:12px;color:var(--muted)">${n.open ? "▾" : "▸"}</button>` : `<span style="width:18px"></span>`}
            <span class="label">${n.name}</span>
            <span class="meta">${n.sku} SKU</span>
          </div>`;
      }).join("");

      treeEl.querySelectorAll(".node").forEach((el) => {
        el.addEventListener("dragstart", (e) => {
          dragId = el.dataset.id;
          el.classList.add("dragging");
          e.dataTransfer.effectAllowed = "move";
        });
        el.addEventListener("dragend", () => {
          dragId = null;
          el.classList.remove("dragging");
          treeEl.querySelectorAll(".drag-over").forEach((n) => n.classList.remove("drag-over"));
        });
        el.addEventListener("dragover", (e) => {
          e.preventDefault();
          el.classList.add("drag-over");
        });
        el.addEventListener("dragleave", () => el.classList.remove("drag-over"));
        el.addEventListener("drop", (e) => {
          e.preventDefault();
          el.classList.remove("drag-over");
          const targetId = el.dataset.id;
          if (!dragId || dragId === targetId) return;
          if (isDescendant(targetId, dragId)) {
            toast("Нельзя вложить родителя в потомка", true);
            return;
          }
          const moving = nodes.find((n) => n.id === dragId);
          const target = nodes.find((n) => n.id === targetId);
          // Nest under target if target is top-level or shift as sibling under same parent via Alt
          const nest = !e.shiftKey;
          if (nest) {
            moving.parentId = target.id;
            target.open = true;
            pushLog(`Moved “${moving.name}” → under “${target.name}”`);
          } else {
            moving.parentId = target.parentId;
            // reorder: place after target among siblings
            const others = nodes.filter((n) => n.id !== moving.id);
            const idx = others.findIndex((n) => n.id === target.id);
            others.splice(idx + 1, 0, moving);
            nodes = others;
            pushLog(`Reordered “${moving.name}” after “${target.name}”`);
          }
          if (nest) {
            // keep relative order: move node after target's last child conceptually by array reorder
            nodes = nodes.filter((n) => n.id !== moving.id);
            const tIdx = nodes.findIndex((n) => n.id === target.id);
            nodes.splice(tIdx + 1, 0, moving);
          }
          toast("Иерархия обновлена");
          render();
        });
      });
    }

    function renderSide() {
      const count = selected.size;
      const skus = nodes.filter((n) => selected.has(n.id)).reduce((a, n) => a + n.sku, 0);
      batchPanel.innerHTML = `
        <div class="batch"><b>${count || 0} категорий выбрано</b>${skus} SKU в выделении</div>
        <div class="toolbar" style="margin-bottom:12px">
          <button class="btn" id="moveDining" ${count ? "" : "disabled"}>Move → Dining</button>
          <button class="btn" id="seasonal" ${count ? "" : "disabled"}>Reorder seasonal</button>
        </div>
        <div class="batch" style="background:var(--warn-soft);border-color:rgba(154,91,22,0.2)">
          <b>Optimistic UI</b>
          Publish пишет draft; конфликт откатывается в демо-тосте.
        </div>`;
      logEl.innerHTML = logs.length
        ? logs.map((l) => `<div><b style="color:var(--ink)">${l.at}</b> · ${l.text}</div>`).join("")
        : `<div>Перетащите категорию или отметьте узлы для batch.</div>`;

      document.getElementById("moveDining")?.addEventListener("click", () => {
        const dining = nodes.find((n) => n.id === "dining");
        [...selected].forEach((id) => {
          if (id === "dining") return;
          if (isDescendant("dining", id)) return;
          const n = nodes.find((x) => x.id === id);
          if (n) n.parentId = "dining";
        });
        dining.open = true;
        pushLog(`Batch move ${count} nodes → Dining`);
        toast("Batch move выполнен");
        selected.clear();
        render();
      });
      document.getElementById("seasonal")?.addEventListener("click", () => {
        pushLog(`Seasonal reorder queued for ${count} nodes`);
        toast("Сезонный порядок помечен");
      });
    }

    function render() {
      renderTree();
      renderSide();
    }

    treeEl.addEventListener("click", (e) => {
      const sel = e.target.closest("[data-select]");
      if (sel) {
        const id = sel.dataset.select;
        if (selected.has(id)) selected.delete(id);
        else selected.add(id);
        render();
        return;
      }
      const tog = e.target.closest("[data-toggle]");
      if (tog) {
        const n = nodes.find((x) => x.id === tog.dataset.toggle);
        if (n) n.open = !n.open;
        render();
      }
    });

    document.getElementById("expandAll").onclick = () => {
      nodes.forEach((n) => (n.open = true));
      render();
    };
    document.getElementById("collapseAll").onclick = () => {
      nodes.forEach((n) => { if (n.parentId === null) n.open = false; });
      render();
    };
    publishBtn.onclick = () => {
      if (publishBtn.disabled) return;
      if (Math.random() < 0.25) {
        toast("Conflict · draft rolled back (demo)", true);
        pushLog("Publish conflict — optimistic rollback");
      } else {
        dirty = false;
        publishBtn.disabled = true;
        toast("Hierarchy published");
        pushLog("Published draft hierarchy");
        dirty = false;
        publishBtn.disabled = true;
      }
      renderSide();
    };

    // Hash scenes for portfolio wiring
    function applyScene() {
      const hash = (location.hash || "#/tree").replace("#", "");
      document.querySelectorAll(".chip").forEach((c) => {
        c.classList.toggle("on", `#${c.dataset.scene}` === hash || (hash === "/" && c.dataset.scene === "tree") || (hash === "/tree" && c.dataset.scene === "tree") || (hash === "/batch" && c.dataset.scene === "batch"));
      });
      if (hash === "/batch" || hash === "batch") {
        // focus batch: preselect living children
        selected.clear();
        nodes.filter((n) => n.parentId === "living").forEach((n) => selected.add(n.id));
        render();
      }
    }
    document.querySelectorAll(".chip").forEach((c) => {
      c.onclick = () => { location.hash = `#/${c.dataset.scene}`; };
    });
    window.addEventListener("hashchange", applyScene);
    render();
    applyScene();
  </script>
</body>
</html>
